# skills-audit v4.0 配置
# Project Skill Audit — 项目技能审计

data_dir: "$SKILL_DIR"
archive_dir: "$SKILL_DIR/../archived"

scan_paths:
  # 通用路径（跨 AI 助手）— 用户技能通常在此
  - name: "用户技能 (.agents)"
    path: "~/.agents/skills/*/"
    type: user
    editable: true
  # ZCode 特有多路径
  - name: "用户技能 (.zcode)"
    path: "~/.zcode/skills/*/"
    type: user
    editable: true
  # Claude Code 路径
  - name: "Claude Code 技能"
    path: "~/.claude/skills/*/"
    type: user
    editable: true
  # 插件/系统技能（各平台路径不同，此为 ZCode 示例）
  - name: "插件技能"
    path: "~/.zcode/cli/plugins/cache/*/*/skills/*/"
    type: system
    editable: false

# 项目扫描配置
project_scan:
  max_depth: 10
  max_files: 2000
  ignore_patterns:
    - "node_modules"
    - ".git"
    - ".venv"
    - "__pycache__"
    - "dist"
    - "build"
    - ".next"
    - "target"
    - "vendor"
    - ".svn"
    - ".hg"
    - "bower_components"
    - ".tox"
    - "*.pyc"

# 版本检查
version_check:
  enabled: true
  registry_url: ""
  search_template: "{skill_name} AI agent skill latest version"

# 用户自定义搭配规则（可选覆盖）
custom_rules:
  # 示例：自定义规则，优先级高于 project-types.yaml
  # - condition: "项目使用 React 且无状态管理库"
  #   suggest: "添加 zustand 或 jotai"
  #   reason: "React 项目需要状态管理"
  #   effect: "减少 prop drilling 和组件耦合"
  #   use_case: "跨组件共享状态时使用"

# 输出语言
output_language: "auto"  # auto / zh / en
