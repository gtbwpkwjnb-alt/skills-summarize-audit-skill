# skills-audit v5.9.0 配置
# Project Skill Audit — 项目技能审计
# 唯一配置源。scan_paths 以此文件为准。
# platforms/zcode.yaml 仅存平台特征（归档路径等），不定义扫描路径。
#
# ⚠️ 触发词权威来源：SKILL.md 第24-27行（触发词矩阵）。
# platforms/*.yaml 中的 trigger_words 为平台适配副本，修改时需同步更新。
# 同步规则：修改触发词 → 更新 SKILL.md → 同步所有 platforms/*.yaml。

data_dir: "$SKILL_DIR"
archive_dir: "$SKILL_DIR/../archived"

scan_paths:
  # 通用路径（跨 AI 助手）— 用户技能通常在此
  - name: "用户技能 (.agents)"
    path: "~/.agents/skills/*/"
    type: user
    editable: true
    # ZCode 特有多路径
  - name: "用户技能 (.zcode)"
    path: "~/.zcode/skills/*/"
    type: user
    editable: true
    # Claude Code 路径
  - name: "Claude Code 技能"
    path: "~/.claude/skills/*/"
    type: user
    editable: true
    # 插件/系统技能（按实际环境修改路径）
    - name: "插件技能"
      path: "~/.zcode/cli/plugins/cache/*/*/skills/*/"
      type: system
      editable: false

# 项目扫描配置
project_scan:
  max_depth: 10
  max_files: 2000
  ignore_patterns:
  - "node_modules"
  - ".git"
  - ".venv"
  - "__pycache__"
  - "dist"
  - "build"
  - ".next"
  - "target"
  - "vendor"
  - ".svn"
  - ".hg"
  - "bower_components"
  - ".tox"
  - "*.pyc"

# 版本检查
version_check:
  enabled: true
  registry_url: ""
  search_template: "{skill_name} AI agent skill latest version"

# 用户自定义搭配规则（v5.7.0 轻量实现）
# 规则在 ⑤b 推荐引擎 B层之后、C层之前执行。
# 每条规则含：condition（画像字段匹配）/ action（add_skill | remove_skill | suggest）
custom_rules:
  enabled: false           # 设为 true 启用自定义规则
  rules:
    # 示例1: 添加特定技术栈推荐
    # - condition:
    #     field: "tech_stack"
    #     contains: "React"
    #   action: add_skill
    #   skill: "skill-tester"
    #   priority: recommended
    #   reason: "React 项目需要组件测试"
    # 示例2: 移除不适合的默认推荐
    # - condition:
    #     field: "type"
    #     equals: "游戏-Unity"
    #   action: remove_skill
    #   skill: "test-driven-development"
    #   reason: "Unity 使用 PlayMode 测试，传统 TDD 不适用"
    # 示例3: 条件建议
    # - condition:
    #     field: "activity_count"
    #     less_than: 3
    #   action: suggest
    #   message: "当前项目核心活动较少，建议在 MEMORY.md 中补充项目用途说明以提升推荐精准度"

# 输出语言
output_language: "auto"  # auto / zh / en

# 外部信号缓存（增量获取，避免每次全量 WebFetch）
external_signals_cache:
  enabled: true
  github_ttl_days: 7      # GitHub ⭐/更新时间 缓存 7 天
  npm_ttl_days: 30         # npm 下载量 缓存 30 天
  cache_file: "external-signals-cache.json"

# 开发搜索策略（先搜索后开发）
dev_search_policy:
  enabled: true
  min_sources: 2           # 至少引用 2 个独立来源
  required_domains:
  - "github.com"
  - "pypi.org"
  - "npmjs.com"
  - "crates.io"

# 项目记忆配置
memory_config:
  project_memory_file: "memories/MEMORY.md"
  auto_sync: true          # 审计后自动回写 MEMORY.md
  sections:
  - "environment"
  - "tech_stack"
  - "interests"
  - "paths"
  - "project"
  - "commands"
  - "architecture"
  new_project_ask: true    # 无 MEMORY.md 时询问用户

# MCP 服务器配置路径（v5.3.0 新增 — 跨层能力扫描）
mcp_config:
  # 扫描的 MCP 配置文件，读取 mcp.servers / mcpServers 块
  files:
    - "~/.zcode/cli/config.json"       # ZCode MCP 服务器
    - "~/.claude.json"                  # Claude Code MCP 服务器
  scan_mcp_servers: true               # 启用后，步骤②额外扫描 MCP 工具
  tool_desc_max_length: 80             # MCP 工具描述截断长度

# 健康阈值
health_thresholds:
  max_total_skills: 30     # 超过此数输出 🚨 预警
  max_t3_ratio: 0.3        # T3 占比超过 30% 预警
  overlap_threshold: 0.6   # description 关键词重叠 >60% 标 ⚠️
  zero_match_warn: 0        # 与画像零匹配技能 > 0 标 🟡

# CI/CD 无交互模式（v5.8.0 新增）
ci:
  enabled: true
  max_tokens: 8000          # CodeBuddy 专业版上限约束，Claude Code 可调高
  skip_steps:
    - "④-bis"               # 跳过逐技能深度阅读（最大节省项）
  output:
    format: "json"
    fields: ["summary", "alerts", "capacity_analysis", "exit_code"]
  gates:
    health_min: "🟡"        # 🟡 以下 → exit_code=1
    t3_ratio_max: 0.35       # 超过 → exit_code=3
    actions_max: 5           # 超过 → exit_code=2

# 安全扫描（v5.8.0 新增）
security_scan:
  enabled: false             # 设为 true 启用
  tool: "builtin"            # "skillspector" 或 "builtin"（内置轻量规则）
  skillspector_path: ""      # 留空自动查找
  rules: ["all"]             # 或 ["injection", "malware", "secret"]
  fail_on: "critical"        # critical / high / medium / none
  output_format: "json"
  ci_integration: true       # CI 模式自动执行

# 活性检测（v5.9.0 新增）
liveness_check:
  enabled: true
  # 5 项检测开关
  check_mcp: true
  check_commands: true
  check_trigger: true
  check_data_dir: true
  check_usage_evidence: true
  # 增量检测时，上次结果缓存文件
  cache_file: "stats.json"
