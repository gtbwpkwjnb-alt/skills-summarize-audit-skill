# skills-summarize-audit v5.9.3 配置
# Project Skill Audit — 项目技能审计
# 唯一配置源。scan_paths 以此文件为准。
# platforms/zcode.yaml 仅存平台特征（归档路径等），不定义扫描路径。
#
# ⚠️ 触发词权威来源：SKILL.md 触发词矩阵（第 31-41 行）。
# platforms/*.yaml 不定义扫描路径，也不重复定义触发词，仅保留平台特征（归档路径、Agent 模型约束等）。
# 同步规则：修改触发词 → 仅需更新 SKILL.md。

# 运行时数据目录（v5.9.2 治理）：所有缓存/日志/统计文件统一放 .data/，避免与源码混在一起
data_dir: "$SKILL_DIR/.data"
archive_dir: "$SKILL_DIR/../archived"

scan_paths:
  # 通用路径（跨 AI 助手）— 用户技能通常在此
  - name: "用户技能 (.agents)"
    path: "~/.agents/skills/*/"
    type: user
    editable: true
    # ZCode 特有多路径
  - name: "用户技能 (.zcode)"
    path: "~/.zcode/skills/*/"
    type: user
    editable: true
    # Claude Code 路径
  - name: "Claude Code 技能"
    path: "~/.claude/skills/*/"
    type: user
    editable: true
  # 插件/系统技能（按实际环境修改路径）
  - name: "插件技能"
    path: "~/.zcode/cli/plugins/cache/*/*/skills/*/"
    type: system
    editable: false

# 项目扫描配置
project_scan:
  max_depth: 10
  max_files: 2000
  ignore_patterns:
  - "node_modules"
  - ".git"
  - ".venv"
  - "__pycache__"
  - "dist"
  - "build"
  - ".next"
  - "target"
  - "vendor"
  - ".svn"
  - ".hg"
  - "bower_components"
  - ".tox"
  - "*.pyc"

# 版本检查
version_check:
  enabled: true
  registry_url: ""
  search_template: "{skill_name} AI agent skill latest version"

# (removed v5.7.0 custom_rules — 轻量规则引擎从未启用，于 v5.9.1 移除死代码)

# 操作快照（v5.9.1）— 执行前自动备份，支持 --undo
snapshot:
  enabled: true
  dir: "~/.agents/skills/.audit-snapshots/"
  retention_days: 7           # 快照保留天数
  auto_before_exec: true      # ⑦执行前自动创建快照

# 输出语言
output_language: "auto"  # auto / zh / en

# 外部信号缓存（增量获取，避免每次全量 WebFetch）
external_signals_cache:
  enabled: true
  github_ttl_days: 7      # GitHub ⭐/更新时间 缓存 7 天
  npm_ttl_days: 30         # npm 下载量 缓存 30 天
  # 中文社区信号源（v5.9.1，默认关闭）
  china_sources:
    enabled: false          # 设为 true 启用知乎/掘金/CSDN 采集
    zhihu_ttl_days: 14
    juejin_ttl_days: 14
    csdn_ttl_days: 14
  cache_file: ".data/external-signals-cache.json"

# 开发搜索策略（先搜索后开发）
dev_search_policy:
  enabled: true
  min_sources: 2           # 至少引用 2 个独立来源
  required_domains:
  - "github.com"
  - "pypi.org"
  - "npmjs.com"
  - "crates.io"

# 项目记忆配置
memory_config:
  project_memory_file: "memories/MEMORY.md"
  auto_sync: true          # 审计后自动回写 MEMORY.md
  sections:
  - "environment"
  - "tech_stack"
  - "interests"
  - "paths"
  - "project"
  - "commands"
  - "architecture"
  new_project_ask: true    # 无 MEMORY.md 时询问用户

# 项目画像自动刷新（v5.9.1 新增）
project_profiles:
  auto_refresh_days: 3      # 超过 3 天未更新时自动触发重新画像
  stale_warn: true          # 审计时检测是否过期并输出告警
  cache_file: ".data/project-profiles.json"

# MCP 服务器配置路径（v5.3.0 新增 — 跨层能力扫描）
mcp_config:
  # 扫描的 MCP 配置文件，读取 mcp.servers / mcpServers 块
  files:
    - "~/.zcode/cli/config.json"       # ZCode MCP 服务器
    - "~/.claude.json"                  # Claude Code MCP 服务器
  scan_mcp_servers: true               # 启用后，步骤②额外扫描 MCP 工具
  tool_desc_max_length: 80             # MCP 工具描述截断长度

# 健康阈值（v5.9.1 多平台化）
health_thresholds:
  # 通用默认值
  default:
    max_total_skills: 30
    max_t3_ratio: 0.3
    overlap_threshold: 0.6
    zero_match_warn: 0
  # 平台特化（覆盖默认）
  per_platform:
    codebuddy:
      max_total_skills: 20
    claude-code:
      max_total_skills: 40
    cursor:
      max_total_skills: 50

# 趋势追踪（v5.9.1 新增）— 历史快照对比
trend_tracking:
  enabled: true
  max_snapshots: 52           # 保留近 52 次审计（约一年，按周审计）
  snapshot_file: ".data/stats.json" # 与 liveness_check 共用

# 容量分析（v5.9.1 多因子有效容量）
capacity_analysis:
  use_effective_capacity: true    # 启用多因子有效容量计算
  cognition_multiplier: 2.0       # 认知容量 = activity_count × 此值
  conflict_penalty: 0.3           # 冲突因子 = 1 - (contamination均分/5 × 此值)

# CI/CD 无交互模式（v5.8.0 新增）
ci:
  enabled: true
  max_tokens: 8000          # CodeBuddy 专业版上限约束，Claude Code 可调高
  skip_steps:
    - "④-bis"               # 跳过逐技能深度阅读（最大节省项）
  output:
    format: "json"
    fields: ["summary", "alerts", "capacity_analysis", "exit_code"]
  gates:
    health_min: "🟡"        # 🟡 以下 → exit_code=1
    t3_ratio_max: 0.35       # 超过 → exit_code=3
    actions_max: 5           # 超过 → exit_code=2

# 安全扫描（v5.8.0 新增）
security_scan:
  enabled: false             # 设为 true 启用
  tool: "builtin"            # "skillspector" 或 "builtin"（内置轻量规则）
  skillspector_path: ""      # 留空自动查找
  rules: ["all"]             # 或 ["injection", "malware", "secret"]
  fail_on: "critical"        # critical / high / medium / none
  output_format: "json"
  ci_integration: true       # CI 模式自动执行

# 活性检测（v5.9.1 新增 check_agent_access）
liveness_check:
  enabled: true
  # 6 项检测开关
  check_agent_access: true    # v5.9.1 新增：Agent 对扫描路径的可达性
  check_mcp: true
  check_commands: true
  check_trigger: true
  check_data_dir: true
  check_usage_evidence: true
  # 增量检测时，上次结果缓存文件
  cache_file: ".data/stats.json"

# 审计日志（v5.9.2 治理）
logging:
  activity_log: ".data/activity-log.jsonl"  # 每次审计/操作的 JSON Lines 日志

