# skills-audit v5.2.0 配置
# Project Skill Audit — 项目技能审计
# 唯一配置源。scan_paths 以此文件为准。
# platforms/zcode.yaml 仅存平台特征（触发词、归档路径等），不定义扫描路径。

data_dir: "$SKILL_DIR"
archive_dir: "$SKILL_DIR/../archived"

scan_paths:
  # 通用路径（跨 AI 助手）— 用户技能通常在此
  - name: "用户技能 (.agents)"
    path: "~/.agents/skills/*/"
    type: user
    editable: true
    # ZCode 特有多路径
  - name: "用户技能 (.zcode)"
    path: "~/.zcode/skills/*/"
    type: user
    editable: true
    # Claude Code 路径
  - name: "Claude Code 技能"
    path: "~/.claude/skills/*/"
    type: user
    editable: true
    # 插件/系统技能示例（按实际环境修改路径）
    # - name: "插件技能"
    #   path: "~/.zcode/cli/plugins/cache/*/*/skills/*/"
    #   type: system
    #   editable: false

# 项目扫描配置
project_scan:
  max_depth: 10
  max_files: 2000
  ignore_patterns:
  - "node_modules"
  - ".git"
  - ".venv"
  - "__pycache__"
  - "dist"
  - "build"
  - ".next"
  - "target"
  - "vendor"
  - ".svn"
  - ".hg"
  - "bower_components"
  - ".tox"
  - "*.pyc"

# 版本检查
version_check:
  enabled: true
  registry_url: ""
  search_template: "{skill_name} AI agent skill latest version"

# 用户自定义搭配规则（可选覆盖）
custom_rules:
  # 示例：自定义规则，优先级高于 project-types.yaml
  # - condition: "项目使用 React 且无状态管理库"
  #   suggest: "添加 zustand 或 jotai"
  #   reason: "React 项目需要状态管理"
  #   effect: "减少 prop drilling 和组件耦合"
  #   use_case: "跨组件共享状态时使用"

# 输出语言
output_language: "auto"  # auto / zh / en

# 外部信号缓存（增量获取，避免每次全量 WebFetch）
external_signals_cache:
  enabled: true
  github_ttl_days: 7      # GitHub ⭐/更新时间 缓存 7 天
  npm_ttl_days: 30         # npm 下载量 缓存 30 天
  cache_file: "external-signals-cache.json"

# 开发搜索策略（先搜索后开发）
dev_search_policy:
  enabled: true
  min_sources: 2           # 至少引用 2 个独立来源
  required_domains:
  - "github.com"
  - "pypi.org"
  - "npmjs.com"
  - "crates.io"

# 项目记忆配置
memory_config:
  project_memory_file: "memories/MEMORY.md"
  auto_sync: true          # 审计后自动回写 MEMORY.md
  sections:
  - "environment"
  - "tech_stack"
  - "interests"
  - "paths"
  - "project"
  - "commands"
  - "architecture"
  new_project_ask: true    # 无 MEMORY.md 时询问用户

# MCP 服务器配置路径（v5.3.0 新增 — 跨层能力扫描）
mcp_config:
  # 扫描的 MCP 配置文件，读取 mcp.servers / mcpServers 块
  files:
    - "~/.zcode/cli/config.json"       # ZCode MCP 服务器
    - "~/.claude.json"                  # Claude Code MCP 服务器
  scan_mcp_servers: true               # 启用后，步骤②额外扫描 MCP 工具
  tool_desc_max_length: 80             # MCP 工具描述截断长度

# 健康阈值
health_thresholds:
  max_total_skills: 30     # 超过此数输出 🚨 预警
  max_t3_ratio: 0.3        # T3 占比超过 30% 预警
  overlap_threshold: 0.6   # description 关键词重叠 >60% 标 ⚠️
  low_usage_warn: 0        # 调用次数 = 0 标 🟡
