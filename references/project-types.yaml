      use_case: "当 SSG 静态生成结果与服务端不一致时系统排查"
    - name: "verification-before-completion"
      priority: essential
      category: dev
      why: "全栈项目完成标准更难定义（需验证前端+API+数据库）"
      effect: "避免前端改完了但 API 没改完的情况"
      use_case: "完成特性时同时验证前端展示和后端接口"

# ============================================================================
# Node.js Backend
# ============================================================================

- pattern:
    files: ["package.json"]
    contains_deps: ["express", "koa", "fastify"]
  type: "Node后端"
  description: "Node.js 后端项目"
  aliases: ["Node.js", "Node Backend", "Node后端", "Express", "Koa", "Fastify"]
  skills:
    - name: "test-driven-development"
      priority: essential
      category: dev
      why: "后端 API 的输入输出边界清晰，是最适合 TDD 的场景"
      effect: "接口覆盖率达到 90%+，重构时无需担心破坏契约"
      use_case: "写路由 handler 前先写请求→响应测试用例"
    - name: "systematic-debugging"
      priority: essential
      category: debug
      why: "Node 异步错误栈有时不清晰，中间件链路排查容易迷失"
      effect: "系统化方法让错误定位从『猜』变成『推演』"
      use_case: "当请求链路中某中间件报错时，分段排查定位"
    - name: "requesting-code-review"
      priority: recommended
      category: review
      why: "API 变更影响前端/客户端，review 需关注向后兼容性"
      effect: "减少破坏性 API 变更，降低与其他服务的集成成本"
      use_case: "修改 API 路由/参数时，自动检查兼容性影响"

# ============================================================================
# AI Agent Skill Development
# ============================================================================

- pattern:
    contains_files: ["SKILL.md"]
    count_min: 1
  type: "AI Agent 技能开发"
  description: "AI Agent 技能/插件开发项目"
  aliases: ["Skill Dev", "技能开发", "SKILL.md", "Agent Skill"]
  # 画像补充标签 — 用于多维画像生成
  profile_tags:
    activities:
      - "技能编写(SKILL.md)"
      - "Agent编排(触发词/路由)"
      - "工具链开发(Python/JS脚本)"
      - "MCP集成"
      - "规则维护(AGENTS.md)"
      - "技能测试验证"
      - "文档撰写"
      - "版本管理与发布"
    tech_stacks: ["Markdown/SKILL.md", "YAML", "Python", "JavaScript", "PowerShell", "MCP"]
    products: ["SKILL.md", "AGENTS.md", ".py", ".js", ".yaml", ".json", ".ps1"]
  skills:
    - name: "skill-creator"
      priority: essential
      category: dev
      why: "当前目录包含 SKILL.md 表明正在开发技能，skill-creator 是官方创作工具"
      effect: "提供从草稿→测试→迭代的标准化流程，减少忘记步骤的返工"
      use_case: "编写新 SKILL.md 或迭代已有技能时引导完整流程"
    - name: "writing-skills"
      priority: essential
      category: dev
      why: "writing-skills 提供 Anthropic 最佳实践和模板，适合技能开发参考"
      effect: "基于行业最佳实践编写技能，减少试错成本"
      use_case: "参考技能结构、触发词设计、description 撰写最佳实践"
    - name: "agent-reach"
      priority: essential
      category: dev
      why: "技能开发前必须先搜索验证，agent-reach 是唯一互联网调研入口"
      effect: "确保技能设计基于最新技术文档，避免闭门造车"
      use_case: "开发新技能前搜索同类技能、最佳实践、API 文档"
    - name: "brainstorming"
      priority: recommended
      category: design
      why: "技能设计需要在多个方案间权衡（触发词设计、路由结构、输出格式）"
      effect: "提前暴露设计盲区，减少『写完发现设计不对』的返工"
      use_case: "设计新技能结构前用结构化 brainstorming 探索方案"
    - name: "writing-plans"
      priority: recommended
      category: dev
      why: "多模块技能开发需要清晰的实施计划"
      effect: "将大任务拆解为可执行的原子步骤，避免遗漏"
      use_case: "开始复杂技能开发前编写实施计划"
    - name: "verification-before-completion"
      priority: recommended
      category: dev
      why: "技能开发完成后容易遗漏配置或路径问题"
      effect: "确保每次完成都经过: 描述检查→路径验证→触发测试"
      use_case: "完成技能编写后，在声称完成前运行验证"
    - name: "summarize"
      priority: recommended
      category: docs
      why: "技能开发迭代周期长，会话容易累积大量上下文"
      effect: "保持会话清洁，减少 token 浪费"
      use_case: "长会话结束时自动精炼进度和待办事项"
    - name: "skills-summarize-audit"
      priority: recommended
      category: dev
      why: "技能开发后需要审计评分，确保质量达标"
      effect: "检查技能是否符合规范、description 是否优化、依赖是否完整"
      use_case: "技能开发完成后运行审计获取改进建议"
    - name: "scrapling"
      priority: optional
      category: dev
      why: "调研竞品技能或参考文档时可能需要深度抓取"
      effect: "批量获取竞品技能实现细节，辅助设计决策"
      use_case: "研究同类技能的 SKILL.md 实现方式"

