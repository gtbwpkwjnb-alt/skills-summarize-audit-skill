  skills:
    - name: "systematic-debugging"
      priority: recommended
      category: debug
      why: "任何类型的开发项目都会遇到 Bug，系统化调试是通用能力"
      effect: "减少随机试错，提升调试效率"
      use_case: "遇到任何 Bug 时的标准化排查流程"
    - name: "verification-before-completion"
      priority: recommended
      category: dev
      why: "无论什么项目，『完成』的标准需要有可重复验证流程"
