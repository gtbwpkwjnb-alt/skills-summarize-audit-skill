- pattern:
    files: ["package.json"]
    contains_deps: ["next"]
  type: "Web全栈-Next.js"
  description: "Next.js 全栈项目"
  aliases: ["Next.js", "Next", "Next 全栈"]
  skills:
    - name: "test-driven-development"
      priority: essential
      category: dev
      why: "Next.js 同时包含前端组件和后端 API 路由，两端都需要测试覆盖"
      effect: "前后端一致的 TDD 流程，减少跨端 Bug"
      use_case: "API route 和页面组件的测试驱动开发"
