# ============================================================================
# Container / DevOps
# ============================================================================

- pattern:
    files: ["Dockerfile"]
  type: "容器化"
  description: "使用 Docker 的项目"
  aliases: ["Docker", "Container", "容器化"]
  skills:
    - name: "using-git-worktrees"
      priority: optional
      category: dev
      why: "容器化项目通常涉及多服务协同，工作区隔离需求高"
      effect: "服务间互不干扰的独立开发环境"
      use_case: "同时开发多个微服务时，每个服务一个独立工作区"

# ============================================================================
# Generic / Fallback
# ============================================================================

- pattern:
    fallback: true
  type: "通用"
  description: "未能识别类型的项目"
  aliases: ["Generic", "通用项目"]
  skills:
    - name: "systematic-debugging"
      priority: recommended
      category: debug
      why: "任何类型的开发项目都会遇到 Bug，系统化调试是通用能力"
      effect: "减少随机试错，提升调试效率"
      use_case: "遇到任何 Bug 时的标准化排查流程"
    - name: "verification-before-completion"
      priority: recommended
      category: dev
      why: "无论什么项目，『完成』的标准需要有可重复验证流程"
      effect: "每次完成有据可查，减少遗漏"
      use_case: "开发任务完成后的标准化验证"
