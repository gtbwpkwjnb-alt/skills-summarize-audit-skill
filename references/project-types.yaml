      category: dev
      why: "Svelte 项目通常较小，容易跳过验证步骤"
      effect: "确保每次完成都经过标准验证流程"
      use_case: "组件完成后运行测试+检查清单"

# ============================================================================
# Container / DevOps
# ============================================================================

- pattern:
    files: ["Dockerfile"]
  type: "容器化"
  description: "使用 Docker 的项目"
  aliases: ["Docker", "Container", "容器化"]
  skills:
    - name: "using-git-worktrees"
      priority: optional
      category: dev
      why: "容器化项目通常涉及多服务协同，工作区隔离需求高"
      effect: "服务间互不干扰的独立开发环境"
      use_case: "同时开发多个微服务时，每个服务一个独立工作区"

- pattern:
    files: ["docker-compose.yml", "docker-compose.yaml"]
  type: "DevOps-多服务"
  description: "Docker Compose 多服务编排项目"
  aliases: ["Docker Compose", "微服务", "Microservices"]
  skills:
    - name: "systematic-debugging"
      priority: essential
      category: debug
      why: "多服务环境下问题可能在任意一层（网络/服务/数据），排查链路长"
      effect: "分层排查减少猜测，快速定位问题服务"
      use_case: "当多服务联调异常时按网络→容器→应用层逐层排查"
    - name: "verification-before-completion"
      priority: recommended
      category: dev
      why: "多服务变更需要验证所有服务协同正常"
      effect: "确保每次变更后全链路可用"
      use_case: "修改任一服务后运行全链路验证"
    - name: "dispatching-parallel-agents"
      priority: recommended
      category: dev
      why: "多服务项目可并行修改独立服务"
      effect: "并行开发减少总耗时 30-50%"
      use_case: "同时修改多个独立微服务"

- pattern:
    files: [".github/workflows", ".gitlab-ci.yml", "Jenkinsfile"]
    contains_dirs: [".github/workflows"]
  type: "CI/CD"
  description: "持续集成/持续部署项目"
  aliases: ["CI/CD", "GitHub Actions", "GitLab CI", "Jenkins"]
  skills:
    - name: "verification-before-completion"
      priority: essential
      category: dev
      why: "CI/CD 配置错误可能导致部署失败，需每次验证"
      effect: "减少 Pipeline 失败次数，提升部署成功率"
      use_case: "修改 CI 配置后本地验证 YAML 语法+模拟运行"
    - name: "systematic-debugging"
      priority: essential
      category: debug
      why: "CI/CD Pipeline 失败信息可能不够直观"
      effect: "结构化排查减少反复 commit 试错"
      use_case: "Pipeline 失败时按阶段逐层排查"

