# ============================================================================
# Skill Registry — 已知技能注册表
# ============================================================================
# 本文件维护已知技能的元数据：版本号、分类、来源。
# 用途：
#   1. 版本对比 → 检测已安装技能是否需要更新
#   2. 分类标记 → 推荐时按类别分组
#   3. 来源追溯 → 用户可查安装来源
#
# 更新方式：手动维护 + ④-bis 版本自动回写（v5.7.0）+ web 搜索辅助验证
# 版本自动回写规则：
#   - ④-bis 从各技能 SKILL.md frontmatter 提取 version 字段
#   - 对比 registry 中记录：一致跳过 / 不一致更新 / 无记录追加

