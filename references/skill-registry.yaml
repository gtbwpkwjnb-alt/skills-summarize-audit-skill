# ============================================================================
# Skill Registry — 已知技能注册表
# ============================================================================
# 本文件维护已知技能的元数据：版本号、分类、来源。
# 用途：
#   1. 版本对比 → 检测已安装技能是否需要更新
#   2. 分类标记 → 推荐时按类别分组
#   3. 来源追溯 → 用户可查安装来源
#
# 更新方式：手动维护 + web 搜索辅助验证 + 审计时与各技能 SKILL.md/README/VERSION 交叉比对

skills:
  # ---- User Skills (用户技能, .agents/skills/) ----

  - name: "skills-audit"
    version: "4.3.0"
    category: management
    tags: ["audit", "project-scan", "recommendation"]
    description: "技能审查 → 画像驱动·四维评分·规划追踪"
    source: "local"
    homepage: "https://github.com/gtbwpkwjnb-alt/skills-audit-skill"

    - name: "summarize"
      version: "5.9.0"
      category: docs
      tags: ["summary", "session", "context", "token-tracking", "skill-analytics", "reversible-compression", "cross-agent", "3-tier-self-healing", "git-versioned", "error-immune", "self-evolving", "error-prevention"]
      description: "🛡️ 错误免疫系统: 自动收割错误→5维分类→多信号检索→规则自进化→采纳追踪→收敛预警。保留 summarize 触发词。"
      source: "local"
    homepage: "https://github.com/gtbwpkwjnb-alt/summarize-skill"

  # ---- Plugin Skills (系统/插件技能) ----

  - name: "skill-creator"
    version: "0.1.0"
    category: dev
    tags: ["skill", "creation", "iteration"]
    description: "创建新技能、编辑现有技能并迭代措辞"
    source: "zcode-plugins-official"
    plugin: "skill-creator"

  - name: "docx"
    version: "0.1.0"
    category: docs
    tags: ["word", "document", "office"]
    description: "完整的 DOCX 文档创建、编辑与分析"
    source: "zcode-plugins-official"
    plugin: "document-skills"

  - name: "pdf"
    version: "0.1.0"
    category: docs
    tags: ["pdf", "document", "report"]
