# ============================================================================
# Tech Fingerprints v1.0 — 项目技术指纹库（大脑加强，不抓取只匹配）
# ============================================================================
# 来源：参考 specfy/stack-analyser (700+ 技术, CC-BY-SA) 精选 + 中文项目实践
# 用途：
#   1. 项目画像 Phase ①：扫描项目文件结构，识别技术栈
#   2. 不依赖运行时，纯文件名/路径/内容静态匹配
#   3. 配合 project-types.yaml 决定推荐技能
#
# 与 project-types.yaml 的分工：
#   - project-types.yaml：项目"类型"→ 推荐技能映射（高层抽象）
#   - tech-fingerprints.yaml：项目"使用了什么"→ 具体技术识别（底层证据）
#
# 匹配规则：
#   - files:    路径或文件名 glob 匹配（如 "package.json" / "src/**/*.tsx"）
#   - contents: 文件内容正则匹配（如 contains "react" in package.json）
#   - confidence: high（≥2 命中）/ medium（1 命中）/ low（仅特征文件）
# ============================================================================

# ──────────────────────────────────────────────
# 前端框架（Frontend Frameworks）
# ──────────────────────────────────────────────
frontend:
  - id: react
    name: "React"
    category: frontend
    fingerprints:
      - files: ["package.json"]
        contents: '"react"\\s*:'
        confidence: high
      - files: ["src/**/*.jsx", "src/**/*.tsx"]
        confidence: medium
    version_probe:
      file: package.json
      jsonpath: "$.dependencies.react"
    tags: [spa, hooks, jsx]

