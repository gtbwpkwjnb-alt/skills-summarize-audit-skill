      - files: ["**/_posts/**/*.md"]
        confidence: low

  - id: hugo
    name: "Hugo"
    category: docs
    fingerprints:
      - files: ["config.toml", "hugo.toml", "config.yaml"]
        contents: 'baseURL|theme\\s*='
        confidence: low
      - files: ["content/**/*.md", "layouts/**/*.html"]
        confidence: low

# ──────────────────────────────────────────────
# 匹配优先级规则
# ──────────────────────────────────────────────
matching_rules:

  # 高置信度先采信
  priority_order: [high, medium, low]

  # 冲突解决：具体框架优先于通用语言
  # 例：命中 nextjs + react + typescript，输出 [Next.js, React, TypeScript]
  specificity:
    framework_over_language: true    # 命中 next.js 不再单列 react
    explicit_over_implicit: true      # 配置文件命中 > 依赖文件命中

  # 项目类型推断（产出多类型可叠加）
  project_type_inference:

    - when_any: [nextjs, nuxt, remix, astro, svelte]
      then_type: "Web 全栈"
      confidence: 0.9

    - when_any: [react, vue, angular, solid]
      then_type: "Web 前端"
      confidence: 0.8

    - when_any: [django, flask, fastapi, spring-boot, rails, laravel]
      then_type: "后端服务"
      confidence: 0.9

    - when_any: [react-native, flutter, android-native, ios-native]
      then_type: "移动应用"
      confidence: 0.9

    - when_any: [electron, tauri, qt]
      then_type: "桌面应用"
      confidence: 0.9

    - when_any: [claude-skill, mcp-server, codex-plugin, zcode-plugin]
      then_type: "AI Agent 工具开发"
      confidence: 0.95

    - when_any: [pytorch, tensorflow, transformers, langchain, llama-index]
      then_type: "AI/ML 项目"
      confidence: 0.9

    - when_any: [monorepo-nx, monorepo-turbo, monorepo-pnpm, lerna]
      then_type: "Monorepo"
      confidence: 0.85

    - when_any: [mkdocs, docusaurus, vitepress, docsify]
      then_type: "文档站点"
      confidence: 0.85

# ──────────────────────────────────────────────
# 输出格式
# ──────────────────────────────────────────────
output_schema:

  detected_technologies:
    - id: "<tech_id>"
      name: "<显示名>"
      category: "<frontend/backend/database/devops/...>"
      version: "<从 version_probe 探测；未探测为 null>"
      confidence: "high|medium|low"
      evidence: ["<命中的文件路径或正则>"]
      tags: ["<关联标签>"]

  inferred_project_types:
    - type: "<类型名>"
      confidence: 0.0-1.0
      based_on: ["<命中的 tech_id 列表>"]

  meta:
    total_technologies_detected: <int>
    high_confidence_count: <int>
    last_scan_at: "<ISO8601>"

